# Basic Site Settings
locale                   : "en-US"
site_theme               : "default"
title                    : "Bohan Li"
title_separator          : "-"
name                     : &name "Bohan Li"
description              : &description "Generative modeling for spatial omics and continuous biological systems"
url                      : "https://你的GitHub用户名.github.io"
baseurl                  : ""
repository               : "你的GitHub用户名/你的GitHub用户名.github.io"

# Author (sidebar)
author:
  avatar           : "profile.png"
  name             : "Bohan Li"
  bio              : "Ph.D. candidate working on generative models for spatial omics resolution enhancement."
  location         : "Beijing, China"
  employer         : "Beihang University"
  email            : "PohanLi@buaa.edu.cn"

  googlescholar    : "https://scholar.google.com/citations?user=CeBWGhQAAAAJ"
  github           : "你的GitHub用户名"

# Publications category (keep simple)
publication_category:
  manuscripts:
    title: 'Publications'

# Site behavior
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false

# Comments OFF（你不需要这个）
comments:
  provider               : false

# Analytics（先关掉）
analytics:
  provider               : false

# Social（先别装）
social:
  type                   : Person
  name                   : "Bohan Li"
  links:
    - "https://scholar.google.com/citations?user=CeBWGhQAAAAJ"

# Collections（保留核心）
collections:
  publications:
    output: true
    permalink: /publications/:path/
  talks:
    output: true
    permalink: /talks/:path/

# Defaults（保持简洁）
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# Markdown
markdown: kramdown
highlighter: rouge

# Plugins（最小必要）
plugins:
  - jekyll-feed
  - jekyll-sitemap
