# Welcome to Jekyll!

# Basic Site Settings
locale                   : "en-US"
site_theme               : "default"
title                    : "Bohan Li"
title_separator          : "-"
name                     : &name "Bohan Li"
description              : &description "Generative modeling for spatial omics and continuous biological systems"
url                      : "https://bohanli-98.github.io"
baseurl                  : "/bohanli.github.io"
repository               : "bohanLi-98/bohanli.github.io"

# Author
author:
  avatar           : "./profile.png"
  name             : "Bohan Li"
  pronouns         :
  bio              : "Ph.D. candidate working on generative models for spatial omics resolution enhancement."
  location         : "Beijing, China"
  employer         : "Beihang University"
  uri              :
  email            : "PohanLi@buaa.edu.cn"

  academia         :
  arxiv            :
  googlescholar    : "https://scholar.google.com/citations?user=CeBWGhQAAAAJ"
  inspire-hep      :
  impactstory      :
  orcid            :
  semantic         :
  ssrn             :
  pubmed           :
  researchgate     :
  scopus           :
  zotero           :

  bitbucket        :
  codepen          :
  dribbble         :
  github           : "bohanLi-98"
  kaggle           :
  stackoverflow    :

  artstation       :
  bluesky          :
  facebook         :
  flickr           :
  foursquare       :
  goodreads        :
  google_plus      :
  keybase          :
  instagram        :
  lastfm           :
  linkedin         :
  mastodon         :
  medium           :
  pinterest        :
  soundcloud       :
  steam            :
  telegram         :
  tumblr           :
  twitter          :
  vine             :
  weibo            :
  wikipedia        :
  xing             :
  youtube          :
  zhihu            :

# Publication Category
publication_category:
  books:
    title: 'Books'
  manuscripts:
    title: 'Journal Articles'
  conferences:
    title: 'Conference Papers'

# Site Settings
teaser                   :
breadcrumbs              : false
words_per_minute         : 160
future                   : true
read_more                : "disabled"
talkmap_link             : false

comments:
  provider               :

analytics:
  provider               : false

# Social
social:
  type                   : Person
  name                   : "Bohan Li"
  links:
    - "https://scholar.google.com/citations?user=CeBWGhQAAAAJ"
    - "https://github.com/bohanLi-98"

# Reading Files
include:
  - .htaccess
  - _pages
  - files

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - node_modules

keep_files:
  - .git
  - .svn

encoding: "utf-8"

# Markdown
markdown: kramdown
highlighter: rouge

# Collections（保留原逻辑）
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# Output
permalink: /:categories/:title/
timezone: Asia/Shanghai

# Plugins（必须保留这些，否则样式会炸）
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji
